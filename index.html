<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Login to Web App</title>
</head>
<body>

  <h1>Login to Web App</h1>

  <form>
    <p>
      <label>Username or Email</label><br>
      <input type="text">
    </p>

    <p>
      <label>Password</label><br>
      <input type="password">
    </p>

    <p>
      <input type="checkbox" id="remember">
      <label for="remember">Remember me on this computer</label>
    </p>

    <button>Login</button>
  </form>

</body>
</html>
