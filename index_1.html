<!DOCTYPE html>
<html>
<head>
    <title>Homework</title>
    <style>
        body {
            height: 100vh;
            background: #6b63a2;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }
        .box {
            width: 300px;
            padding: 40px;
            background-color: #fff0ae;
            border-radius: 10px;
            text-align: center;
        }
        button {
            padding: 10px 20px;
            background-color: ffffff;
            color: rgb(165, 14, 27);
            border: none;
            border-radius: 5px;
            cursor: pointer;    
        }
        /* Pseudo classes */
        button:hover {
            background-color: #6b63a2;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>Hello!</h2>
        <button>Click Me</button>
    </div>
</body>
</html>
